<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 35px;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #0f172a;
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 18px;
        }

        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .bottom-text {
            text-align: center;
            margin-top: 22px;
            color: #6b7280;
        }

        .bottom-text a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo">🔐</div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue to your notes</p>

    <div th:if="${param.error}" class="alert-error">
        Invalid username or password.
    </div>

    <div th:if="${param.logout}" class="alert-success">
        You have logged out successfully.
    </div>

    <div th:if="${param.registered}" class="alert-success">
        Registration successful. Please sign in.
    </div>

    <form th:action="@{/signin}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username">

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password">

        <button type="submit">Sign In</button>
    </form>

    <p class="bottom-text">
        Don’t have an account?
        <a th:href="@{/signup}">Create account</a>
    </p>
</div>

</body>
</html>
