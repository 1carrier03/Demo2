<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .auth-card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            padding: 35px;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.2);
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #2563eb;
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 18px;
        }

        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        .error {
            color: #dc2626;
            font-size: 14px;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .alert {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .bottom-text {
            text-align: center;
            margin-top: 22px;
            color: #6b7280;
        }

        .bottom-text a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo">📝</div>

    <h1>Create Account</h1>
    <p class="subtitle">Start saving your sticky notes securely</p>

    <div th:if="${error}" th:text="${error}" class="alert"></div>

    <form th:action="@{/signup}" th:object="${user}" method="post">
        <label>Username</label>
        <input type="text" th:field="*{username}" placeholder="Enter username">
        <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Enter email address">
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Create password">
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <button type="submit">Create Account</button>
    </form>

    <p class="bottom-text">
        Already have an account?
        <a th:href="@{/signin}">Sign in</a>
    </p>
</div>

</body>
</html>
